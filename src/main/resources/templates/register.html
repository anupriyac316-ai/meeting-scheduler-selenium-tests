<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFFDF5;
      --surface: #FFFFFF;
      --field: #FFFBEC;
      --ink: #2B2A1F;
      --ink-soft: #8A8468;
      --line: #F0E6B8;
      --accent: #E6B400;
      --accent-2: #1FA98C;
      --danger: #E0584D;
      --danger-soft: rgba(224,88,77,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      background-image: radial-gradient(circle at 15% 0%, rgba(230,180,0,0.12), transparent 45%),
                        radial-gradient(circle at 100% 30%, rgba(31,169,140,0.08), transparent 40%);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .back-home {
      position: absolute;
      top: 24px;
      left: 24px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-soft);
      text-decoration: none;
      border: 1px solid var(--line);
      background: var(--surface);
      padding: 8px 14px;
      border-radius: 10px;
      transition: border-color 0.15s ease, color 0.15s ease;
    }
    .back-home:hover { border-color: var(--accent); color: var(--ink); }
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 30px rgba(230,180,0,0.08);
    }
    .eyebrow {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-2);
      margin-bottom: 10px;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.015em;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 14px;
      color: var(--ink-soft);
      margin-bottom: 32px;
    }
    .alert-error {
      background: var(--danger-soft);
      border: 1px solid rgba(224,88,77,0.3);
      color: var(--danger);
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 20px;
    }
    .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
    label { font-size: 13px; font-weight: 600; color: var(--ink-soft); }
    input {
      background: var(--field);
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 11px 13px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      width: 100%;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(230,180,0,0.18);
    }
    .btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #C99A00);
      color: #fff;
      border: none;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 15px;
      padding: 13px;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 8px 20px rgba(230,180,0,0.25);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(230,180,0,0.35); }
    .footer-text {
      text-align: center;
      font-size: 13px;
      color: var(--ink-soft);
      margin-top: 24px;
    }
    .footer-text a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .footer-text a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .back-home { position: static; margin-bottom: 20px; }
      body { padding-top: 24px; }
    }
  </style>
</head>
<body>
  <a class="back-home" href="/home">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to home
  </a>

  <div class="card">
    <div class="eyebrow">Get started</div>
    <h1>Create account</h1>
    <div class="subtitle">Sign up to start scheduling your meetings.</div>

    <div class="alert-error" th:if="${error}" th:text="${error}"></div>

    <form method="post" action="/register">
      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" name="name" placeholder="Raj Kumar" required/>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required minlength="6"/>
      </div>
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="btn">Create account</button>
    </form>

    <div class="footer-text">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</body>
</html>
